services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tatuzin-backend
    restart: unless-stopped
    env_file:
      - backend/.env.production
    volumes:
      - tatuzin_sqlite:/app/data
    expose:
      - "3333"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tatuzin_net

  caddy:
    image: caddy:2-alpine
    container_name: tatuzin-caddy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tatuzin_net

volumes:
  tatuzin_sqlite:
  caddy_data:
  caddy_config:

networks:
  tatuzin_net:

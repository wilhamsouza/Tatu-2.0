services:
  postgres:
    image: postgres:16-alpine
    container_name: tatuzin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB precisa estar no backend/.env.production}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER precisa estar no backend/.env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD precisa estar no backend/.env.production}
    volumes:
      - tatuzin_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - tatuzin_net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tatuzin-backend
    restart: unless-stopped
    env_file:
      - backend/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3333:3333"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3333/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tatuzin_net

volumes:
  tatuzin_postgres_data:

networks:
  tatuzin_net:
